services:
  - type: web
    name: brm-php
    runtime: php
    plan: starter
    buildCommand: |
      php --version
    startCommand: |
      cd /var/www/html
      php -S 0.0.0.0:$PORT
    envVars:
      - key: DB_HOST
        value: ${db.privateURL}:3306
      - key: DB_NAME
        value: barangay_records
      - key: DB_USER
        value: root
      - key: DB_PASS
        sync: false

  - type: pserv
    name: brm-db
    runtime: mysql
    plan: starter
    ipAllowList: []
    envVars:
      - key: MYSQL_DATABASE
        value: barangay_records
      - key: MYSQL_ROOT_PASSWORD
        sync: false
      - key: MYSQL_ROOT_HOST
        value: '%'
